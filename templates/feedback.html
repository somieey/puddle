<!DOCTYPE html>
<html>
<head>
    <title>Feedback | Puddle</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream:#f4ede1;
            --card:#fffdf9;
            --brown:#36281b;
            --brown-soft:#7a6a55;
            --sage:#5f8a5b;
            --sage-soft:#d6e2c8;
            --peach:#d28a5d;
            --peach-soft:#f0ddc8;
            --line:#e2d3ba;
            --shadow:0 24px 50px -24px rgba(80,60,40,.35);
        }

        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family:"Nunito", sans-serif;
            min-height:100vh;
            background:
                radial-gradient(circle at top left,#e3eed8 0%,transparent 30%),
                radial-gradient(circle at top right,#f6e2d2 0%,transparent 35%),
                var(--cream);
            color:var(--brown);
        }

        .page {
            max-width:950px;
            margin:0 auto;
            padding:32px 22px 70px;
        }

        .top-nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:28px;
        }

        .logo {
            font-family:"Baloo 2";
            font-size:34px;
            font-weight:800;
        }

        .back-link {
            text-decoration:none;
            color:var(--brown);
            font-weight:900;
            background:white;
            padding:11px 18px;
            border-radius:999px;
            box-shadow:0 10px 26px -16px rgba(80,60,40,.35);
        }

        .hero {
            display:grid;
            grid-template-columns:1.3fr .7fr;
            gap:28px;
            align-items:center;
            background:linear-gradient(135deg,#fffdf9,#f0ddc8);
            border:1px solid var(--line);
            border-radius:34px;
            padding:42px;
            box-shadow:var(--shadow);
            margin-bottom:30px;
        }

        .badge {
            display:inline-block;
            background:var(--sage-soft);
            color:var(--sage);
            padding:8px 16px;
            border-radius:999px;
            font-weight:900;
            margin-bottom:16px;
        }

        h1 {
            font-family:"Baloo 2";
            font-size:48px;
            line-height:1.05;
            margin-bottom:12px;
        }

        .hero p {
            color:var(--brown-soft);
            font-size:18px;
            line-height:1.6;
        }

        .mascot-box {
            text-align:center;
        }

        .mascot-box img {
            width:210px;
            max-width:100%;
            animation:float 3s ease-in-out infinite;
            filter:drop-shadow(0 18px 20px rgba(80,55,35,.20));
        }

        @keyframes float {
            0%,100% { transform:translateY(0); }
            50% { transform:translateY(-10px); }
        }

        .form-card {
            background:rgba(255,255,255,.78);
            border:1px solid var(--line);
            border-radius:34px;
            padding:34px;
            box-shadow:var(--shadow);
        }

        label {
            display:block;
            font-weight:900;
            margin-bottom:8px;
            color:var(--brown);
        }

        input,
        select,
        textarea {
            width:100%;
            border:1px solid var(--line);
            border-radius:18px;
            padding:15px 16px;
            font-family:inherit;
            font-size:16px;
            font-weight:700;
            color:var(--brown);
            caret-color:var(--brown);
            background:#fffdf9;
            margin-bottom:20px;
        }

        textarea {
            resize:vertical;
            min-height:140px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline:none;
            border-color:var(--sage);
            box-shadow:0 0 0 4px rgba(95,138,91,.18);
        }

        .submit-btn {
            border:none;
            background:var(--peach);
            color:white;
            padding:14px 28px;
            border-radius:999px;
            font-weight:900;
            font-size:16px;
            cursor:pointer;
        }

        .submit-btn:hover {
            transform:translateY(-2px);
            opacity:.95;
        }

        @media(max-width:760px) {
            .hero {
                grid-template-columns:1fr;
                text-align:center;
            }

            h1 {
                font-size:38px;
            }

            .top-nav {
                flex-direction:column;
                gap:14px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <div class="top-nav">
        <div class="logo">🦫 Puddle</div>
        <a href="/dashboard" class="back-link">← Dashboard</a>
    </div>

    <section class="hero">
        <div>
            <span class="badge">💌 Feedback</span>
            <h1>Help improve Puddle.</h1>
            <p>Suggest cute phrases, report bugs, request languages, or share what you want to learn next.</p>
        </div>

        <div class="mascot-box">
            <img src="{{ url_for('static', filename='images/capybara-welcome.png') }}" alt="Capybara mascot">
        </div>
    </section>

    <form method="POST" action="/feedback" class="form-card">

        <label>What is this about?</label>
        <select name="feedback_type" required>
            <option value="Phrase Suggestion">Phrase Suggestion</option>
            <option value="Cute Nickname">Cute Nickname</option>
            <option value="Bug Report">Bug Report</option>
            <option value="Feature Request">Feature Request</option>
            <option value="Language Request">Language Request</option>
            <option value="Other">Other</option>
        </select>

        <label>Language</label>
        <input
            type="text"
            name="language"
            placeholder="Example: Marathi, Hindi, Gujarati"
            value="{{ user.language|default('marathi')|title }}"
        >

        <label>Phrase / word suggestion</label>
        <input
            type="text"
            name="phrase"
            placeholder="Example: What can someone call their boyfriend?"
        >

        <label>Your message</label>
        <textarea
            name="message"
            placeholder="Write your suggestion, bug, idea, or phrase meaning here..."
            required
        ></textarea>

        <button type="submit" class="submit-btn">
            Send Feedback →
        </button>

    </form>

</div>

</body>
</html>
