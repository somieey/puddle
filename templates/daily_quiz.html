<!DOCTYPE html>
<html>
<head>
    <title>Daily Quiz | Puddle</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream:#f4ede1;
            --card:#fffdf9;
            --brown:#36281b;
            --brown-soft:#7a6a55;
            --sage:#5f8a5b;
            --sage-soft:#d6e2c8;
            --peach:#d28a5d;
            --peach-soft:#f0ddc8;
            --line:#e2d3ba;
            --shadow:0 24px 50px -24px rgba(80,60,40,.35);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:"Nunito", sans-serif;
            min-height:100vh;
            background:
                radial-gradient(circle at top left,#e3eed8 0%,transparent 30%),
                radial-gradient(circle at top right,#f6e2d2 0%,transparent 35%),
                var(--cream);
            color:var(--brown);
        }

        .page {
            max-width:950px;
            margin:auto;
            padding:32px 22px 70px;
        }

        .top-nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:28px;
        }

        .logo {
            font-family:"Baloo 2";
            font-size:34px;
            font-weight:800;
        }

        .back-link {
            text-decoration:none;
            color:var(--brown);
            font-weight:900;
            background:white;
            padding:11px 18px;
            border-radius:999px;
            box-shadow:0 10px 26px -16px rgba(80,60,40,.35);
        }

        .hero {
            display:grid;
            grid-template-columns:1.3fr .7fr;
            gap:28px;
            align-items:center;
            background:linear-gradient(135deg,#fffdf9,#f0ddc8);
            border:1px solid var(--line);
            border-radius:34px;
            padding:42px;
            box-shadow:var(--shadow);
            margin-bottom:30px;
        }

        .badge {
            display:inline-block;
            background:var(--sage-soft);
            color:var(--sage);
            padding:8px 16px;
            border-radius:999px;
            font-weight:900;
            margin-bottom:16px;
        }

        h1 {
            font-family:"Baloo 2";
            font-size:48px;
            line-height:1.05;
            margin-bottom:12px;
        }

        .hero p {
            color:var(--brown-soft);
            font-size:18px;
            line-height:1.6;
        }

        .mascot-box {
            text-align:center;
        }

        .mascot-box img {
            width:210px;
            max-width:100%;
            animation:float 3s ease-in-out infinite;
            filter:drop-shadow(0 18px 20px rgba(80,55,35,.20));
        }

        @keyframes float {
            0%,100% { transform:translateY(0); }
            50% { transform:translateY(-10px); }
        }

        .quiz-card {
            background:rgba(255,255,255,.76);
            border:1px solid var(--line);
            border-radius:34px;
            padding:38px;
            box-shadow:var(--shadow);
        }

        .question-label {
            display:inline-block;
            background:var(--peach-soft);
            color:#9c5a32;
            padding:8px 16px;
            border-radius:999px;
            font-weight:900;
            margin-bottom:20px;
        }

        .quiz-word {
            font-family:"Baloo 2";
            font-size:58px;
            line-height:1.05;
            margin-bottom:22px;
            text-align:center;
        }

        .options {
            display:grid;
            gap:14px;
            margin-top:24px;
        }

        .option-card {
            display:block;
            cursor:pointer;
        }

        .option-card input {
            display:none;
        }

        .option-box {
            background:#fffaf4;
            border:2px solid transparent;
            border-radius:20px;
            padding:16px 20px;
            font-weight:900;
            color:var(--brown);
            transition:.2s ease;
        }

        .option-box:hover {
            transform:translateY(-3px);
            box-shadow:0 14px 30px -24px rgba(80,60,40,.45);
        }

        .option-card input:checked + .option-box {
            border-color:var(--sage);
            background:linear-gradient(135deg,#fffdf9,#e8f2dc);
        }

        .submit-btn {
            border:none;
            background:var(--peach);
            color:white;
            padding:14px 28px;
            border-radius:999px;
            font-weight:900;
            font-size:16px;
            cursor:pointer;
            margin-top:26px;
        }

        .submit-btn:hover {
            transform:translateY(-2px);
            opacity:.95;
        }

        .reward-text {
            margin-top:18px;
            color:var(--brown-soft);
            font-weight:800;
            text-align:center;
        }

        @media(max-width:760px) {
            .hero {
                grid-template-columns:1fr;
                text-align:center;
            }

            h1 {
                font-size:38px;
            }

            .top-nav {
                flex-direction:column;
                gap:14px;
            }

            .quiz-word {
                font-size:44px;
            }

            .quiz-card {
                padding:26px;
            }
        }

        input,
textarea {
    transition: .2s ease;
}

input:hover,
textarea:hover {
    background: #fffaf2;
    border-color: #b06334 !important;
    box-shadow: 0 0 0 3px rgba(176,99,52,.16);
}

input:focus,
textarea:focus {
    background: #fffdf9;
    border-color: #5f8a5b !important;
    box-shadow: 0 0 0 5px rgba(95,138,91,.22);
    outline: none;
}
    </style>
</head>
<body>

<div class="page">

    <div class="top-nav">
        <div class="logo">🦫 Puddle</div>
        <a href="/dashboard" class="back-link">← Dashboard</a>
    </div>

    <section class="hero">
        <div>
            <span class="badge">🎯 Daily Quiz</span>
            <h1>Today’s quick challenge.</h1>
            <p>Choose the correct meaning and earn your daily XP reward.</p>
        </div>

        <div class="mascot-box">
            <img src="{{ url_for('static', filename='images/capybara-welcome.png') }}" alt="Capybara mascot">
        </div>
    </section>

    <section class="quiz-card">

        <span class="question-label">What does this word mean?</span>

        <h2 class="quiz-word">{{ quiz_word.word }}</h2>

        <form method="POST" action="/check-daily-quiz">
            <input type="hidden" name="correct_answer" value="{{ quiz_word.meaning }}">

            <div class="options">
                {% for option in options %}
                    <label class="option-card">
                        <input type="radio" name="answer" value="{{ option }}" required>
                        <div class="option-box">
                            {{ option }}
                        </div>
                    </label>
                {% endfor %}
            </div>

            <button type="submit" class="submit-btn">Submit Answer →</button>
        </form>

        <p class="reward-text">⭐ Complete today’s quiz to earn +5 XP.</p>

    </section>

</div>

</body>
</html>
