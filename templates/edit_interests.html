<!DOCTYPE html>
<html>
<head>
    <title>Edit Interests | Puddle</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream:#f4ede1;
            --card:#fffdf9;
            --brown:#36281b;
            --brown-soft:#7a6a55;
            --sage:#5f8a5b;
            --sage-soft:#d6e2c8;
            --peach:#d28a5d;
            --pink-soft:#f1dce0;
            --line:#e2d3ba;
            --shadow:0 24px 50px -24px rgba(80,60,40,.35);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:"Nunito", sans-serif;
            min-height:100vh;
            background:
                radial-gradient(circle at top left,#e3eed8 0%,transparent 30%),
                radial-gradient(circle at top right,#f6e2d2 0%,transparent 35%),
                var(--cream);
            color:var(--brown);
        }

        .page {
            max-width:1050px;
            margin:0 auto;
            padding:32px 22px 70px;
        }

        .top-nav {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:28px;
        }

        .logo {
            font-family:"Baloo 2";
            font-size:34px;
            font-weight:800;
        }

        .back-link {
            text-decoration:none;
            color:var(--brown);
            font-weight:900;
            background:white;
            padding:11px 18px;
            border-radius:999px;
            box-shadow:0 10px 26px -16px rgba(80,60,40,.35);
        }

        .hero {
            display:grid;
            grid-template-columns:1.3fr .7fr;
            gap:28px;
            align-items:center;
            background:linear-gradient(135deg,#fffdf9,#f0ddc8);
            border:1px solid var(--line);
            border-radius:34px;
            padding:42px;
            box-shadow:var(--shadow);
            margin-bottom:30px;
        }

        .badge {
            display:inline-block;
            background:var(--sage-soft);
            color:var(--sage);
            padding:8px 16px;
            border-radius:999px;
            font-weight:900;
            margin-bottom:16px;
        }

        h1 {
            font-family:"Baloo 2";
            font-size:48px;
            line-height:1.05;
            margin-bottom:12px;
        }

        .hero p {
            color:var(--brown-soft);
            font-size:18px;
            line-height:1.6;
        }

        .mascot-box { text-align:center; }

        .mascot-box img {
            width:210px;
            max-width:100%;
            animation:float 3s ease-in-out infinite;
            filter:drop-shadow(0 18px 20px rgba(80,55,35,.20));
        }

        @keyframes float {
            0%,100% { transform:translateY(0); }
            50% { transform:translateY(-10px); }
        }

        form {
            background:rgba(255,255,255,.76);
            border:1px solid var(--line);
            border-radius:34px;
            padding:32px;
            box-shadow:var(--shadow);
        }

        .interest-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
            gap:18px;
            margin-bottom:28px;
        }

        .interest-card {
            cursor:pointer;
            display:block;
        }

        .interest-card input {
            display:none;
        }

        .interest-box {
            min-height:135px;
            background:var(--card);
            border:2px solid transparent;
            border-radius:26px;
            padding:24px;
            box-shadow:0 10px 26px -18px rgba(80,60,40,.35);
            transition:.22s ease;
        }

        .interest-box:hover {
            transform:translateY(-5px);
            box-shadow:0 22px 44px -26px rgba(80,60,40,.45);
        }

        .interest-card input:checked + .interest-box {
            border-color:var(--sage);
            background:linear-gradient(135deg,#fffdf9,#e8f2dc);
        }

        .icon {
            width:52px;
            height:52px;
            display:grid;
            place-items:center;
            border-radius:18px;
            background:var(--pink-soft);
            font-size:28px;
            margin-bottom:14px;
        }

        .interest-box h3 {
            font-family:"Baloo 2";
            font-size:26px;
            text-transform:capitalize;
        }

        .interest-box p {
            color:var(--brown-soft);
            font-size:14px;
            font-weight:700;
        }

        .save-btn {
            border:none;
            background:var(--peach);
            color:white;
            padding:15px 28px;
            border-radius:999px;
            font-weight:900;
            font-size:16px;
            cursor:pointer;
        }

        .save-btn:hover {
            transform:translateY(-2px);
            opacity:.95;
        }

        @media(max-width:760px) {
            .hero {
                grid-template-columns:1fr;
                text-align:center;
            }

            h1 { font-size:38px; }

            .top-nav {
                flex-direction:column;
                gap:14px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <div class="top-nav">
        <div class="logo">🦫 Puddle</div>
        <a href="/profile" class="back-link">← Profile</a>
    </div>

    <section class="hero">
        <div>
            <span class="badge">💛 Edit Interests</span>
            <h1>Update what you love.</h1>
            <p>Choose topics you enjoy so Puddle can keep your practice personal and fun.</p>
        </div>

        <div class="mascot-box">
            <img src="{{ url_for('static', filename='images/capybara-welcome.png') }}" alt="Capybara mascot">
        </div>
    </section>

    <form method="POST" action="/edit-interests">

        {% set selected = user.interests %}

        <div class="interest-grid">

            <label class="interest-card">
                <input type="checkbox" name="interests" value="gaming" {% if "gaming" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">🎮</div>
                    <h3>Gaming</h3>
                    <p>Practice through game topics.</p>
                </div>
            </label>

            <label class="interest-card">
                <input type="checkbox" name="interests" value="anime" {% if "anime" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">🌸</div>
                    <h3>Anime</h3>
                    <p>Practice with anime themes.</p>
                </div>
            </label>

            <label class="interest-card">
                <input type="checkbox" name="interests" value="coding" {% if "coding" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">💻</div>
                    <h3>Coding</h3>
                    <p>Learn with tech examples.</p>
                </div>
            </label>

            <label class="interest-card">
                <input type="checkbox" name="interests" value="music" {% if "music" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">🎵</div>
                    <h3>Music</h3>
                    <p>Use music-based examples.</p>
                </div>
            </label>

            <label class="interest-card">
                <input type="checkbox" name="interests" value="movies" {% if "movies" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">🎬</div>
                    <h3>Movies</h3>
                    <p>Practice with film phrases.</p>
                </div>
            </label>

            <label class="interest-card">
                <input type="checkbox" name="interests" value="cricket" {% if "cricket" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">🏏</div>
                    <h3>Cricket</h3>
                    <p>Learn with sports examples.</p>
                </div>
            </label>

            <label class="interest-card">
                <input type="checkbox" name="interests" value="books" {% if "books" in selected %}checked{% endif %}>
                <div class="interest-box">
                    <div class="icon">📚</div>
                    <h3>Books</h3>
                    <p>Build bookish vocabulary.</p>
                </div>
            </label>

        </div>

        <button type="submit" class="save-btn">Save Changes →</button>

    </form>

</div>

</body>
</html>
