<!DOCTYPE html>
<html>
<head>
    <title>Feedback Sent | Puddle</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family:"Nunito", sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:
                radial-gradient(circle at top left,#e3eed8 0%,transparent 30%),
                radial-gradient(circle at top right,#f6e2d2 0%,transparent 35%),
                #f4ede1;
            color:#36281b;
            padding:24px;
        }

        .card {
            width:620px;
            max-width:100%;
            background:#fffdf9;
            border:1px solid #e2d3ba;
            border-radius:34px;
            padding:46px;
            text-align:center;
            box-shadow:0 24px 50px -24px rgba(80,60,40,.35);
        }

        img {
            width:180px;
            max-width:80%;
            margin-bottom:16px;
        }

        h1 {
            font-family:"Baloo 2";
            font-size:46px;
            margin-bottom:12px;
        }

        p {
            color:#7a6a55;
            font-weight:800;
            font-size:18px;
            line-height:1.6;
        }

        a {
            display:inline-block;
            margin-top:26px;
            text-decoration:none;
            background:#d28a5d;
            color:white;
            padding:14px 24px;
            border-radius:999px;
            font-weight:900;
        }
    </style>
</head>
<body>

<div class="card">

    <img src="{{ url_for('static', filename='images/capybara-happy.png') }}" alt="Happy capybara">

    <h1>Feedback Sent 💛</h1>

    <p>Thank you for helping Puddle grow. Your suggestion has been saved.</p>

    <a href="/dashboard">Back to Dashboard →</a>

</div>

</body>
</html>
